[input_gamepad]
#filter_name = "Steam Controller"
# 0x28de (valve)
filter_vendor_id = 0x28de
# steam controller 2026: 0x1304 (puck), 0x1302 (usb), 0x1303 (bt)
filter_product_id = [0x1304,0x1302,0x1303]
# this controls the polling rate
wait_timeout_ms = 4

[simulate_gamepad]
name = "Microsoft Xbox Series S|X Controller"
bus_type = "BUS_USB"
vendor_id = 0x045e
product_id = 0x0b12
version = 0x0509
# enabling rumble requires setting wait_timeout_ms to a lower value like e.g. 4ms
enable_rumble = true

[behavior]

[buttons]
south = "south"
east = "east"
# need to be swapped for some reason, else it's swapped in many programs/games
north = "west"
west = "north"
start = "start"
back = "select"
left_shoulder = "tl"
right_shoulder = "tr"
left_stick = "thumbl"
right_stick = "thumbr"
# steam button
guide = "mode"
# share button
misc1 = 167 # KEY_RECORD
left_paddle1 = 0x224 # BTN_GRIPL
right_paddle1 = 0x225 # BTN_GRIPR
left_paddle2 = 0x226 # BTN_GRIPL2
right_paddle2 = 0x227 # BTN_GRIPR2

[axes]
left_trigger = { code = "z", out_range = [0,1023] }
right_trigger = { code = "rz", out_range = [0,1023] }
leftx = { code = "x", fuzz = 16, flat = 0 }
rightx = { code = "rx", fuzz = 16, flat = 0 }
lefty = { code = "y", fuzz = 16, flat = 0 }
righty = { code = "ry", fuzz = 16, flat = 0 }

[hats]
# map hats by index
0 = ["hat0x","hat0y"]

[sticks]
left = { axis = ["leftx","lefty"], deadzone = 0.15, process = true }
right = { axis = ["rightx","righty"], deadzone = 0.15, process = true }
