[package]
name = "sdl3toevdev"
version = "0.1.0"
edition = "2024"

[dependencies]
sdl3 = { version = "0.18.4", features = ["build-from-source-static"] }
sdl3-sys = { version = "0.6.6", features = ["build-from-source-static"] }
evdev = "0.13.2"
anyhow = "1"
toml = "1.1.2"
serde = { version = "1", features = ["derive"] }

[profile.release]
debug = true
codegen-units = 1
