[input_gamepad]
#filter_name = "Steam Controller"
# 0x28DE (valve)
filter_vendor_id = 0x28DE
# 0x1304 (puck), 0x1302 (usb), 0x1303 (bt)
filter_product_id = [0x1304,0x1302,0x1303]
wait_timeout_ms = 4

[simulate_gamepad]
name = "Microsoft X-Box 360 pad"
bus_type = "BUS_USB"
vendor_id = 0x045E
product_id = 0x028E
version = 0x110
# enabling rumble requires setting wait_timeout_ms to a lower value like e.g. 4ms
enable_rumble = true

[behavior]
# whether dpad should be emulated as dpad buttons. If disabled, button mappings with dpad = true flag will be disabled.
dpad_to_dpad = false
# whether dpad should be emulated as hat0 (recommended). If enabled, other mappings to hat0 will be ignored.
dpad_to_hat0 = true
rumble_multiplier_left = 1.0
rumble_multiplier_right = 1.0

[sdl_hints]
SDL_JOYSTICK_LINUX_DEADZONES = "1"

[button_map]
south = "south"
east = "east"
# need to be swapped for some reason, else it's swapped in many programs/games
north = "west"
west = "north"
start = "start"
back = "select"
left_shoulder = "tl"
right_shoulder = "tr"
left_stick = "thumbl"
right_stick = "thumbr"
# steam button
guide = "mode"

[axis_map]
left_trigger = { key = "z", out_range = [0,255] }
right_trigger = { key = "rz", out_range = [0,255] }
leftx = "x"
rightx = "rx"
lefty = "y"
righty = "ry"
